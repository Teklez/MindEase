# Development overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# All services mount local source and enable hot reload.
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  ai-service:
    volumes:
      - ./ai-service/app:/app/app
      - ./ai-service/prompts:/app/prompts
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: ""
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
      BACKEND_PROXY_URL: http://backend:8000
      NODE_ENV: development
    # Remove build-time arg dependency; env vars are read at runtime in dev mode
    depends_on:
      backend:
        condition: service_healthy
